services:
  nginx:
    restart: always

  kong:
    restart: always

  otel_collector:
    restart: always

  elasticsearch:
    restart: always

  kibana:
    restart: always

  prometheus:
    restart: always

  grafana:
    restart: always

  jaeger:
    restart: always

  kafka:
    restart: always

  service_1:
    build:
      context: ./apps/service_1
      target: prod
    restart: always
    volumes:
      - ./settings/service_1/entrypoint_prod.sh:/etc/_entrypoint.sh:ro
    entrypoint: /etc/_entrypoint.sh

  service_2:
    build:
      context: ./apps/service_2
      target: prod
    restart: always
